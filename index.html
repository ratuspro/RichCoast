<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Locked portrait, no pinch-zoom, draw under the notch. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>RichCoast</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d12;
        overflow: hidden;
        /* Kill browser touch gestures (scroll/zoom/pull-to-refresh) so the
           canvas owns every touch. */
        touch-action: none;
        overscroll-behavior: none;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
